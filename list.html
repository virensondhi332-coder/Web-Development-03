<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body bgcolor="lightblue">
    <h1> Ordered List </h1>
    <ol type="1"> 
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Grapes</li>
        <li>Orange</li>
    </ol>
    <br>
    <h1> Unordered List </h1>
    <ul type="square">
        <li>potato</li>
        <li>tomato</li>
        <li>onion</li>
        <li>carrot</li>
        <li>cabbage</li>
        <li>spinach</li>
    </ul>
    <br>
    <h1> Description List </h1>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JS</dt>
        <dd>JavaScript</dd>
</body>
</html>
